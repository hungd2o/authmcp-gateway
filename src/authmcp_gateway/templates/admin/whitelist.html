{% extends "admin/base.html" %}

{% block title %}Whitelist Approval{% endblock %}

{% block content %}
<div class="max-w-6xl mx-auto" x-data="whitelistManager()">
    <div class="mb-6">
        <h1 class="text-3xl font-bold text-gray-900">Whitelist Approval Queue</h1>
        <p class="text-gray-600 mt-1">Approve or block pending MCP servers and virtual tools.</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <section class="bg-white rounded-lg border border-gray-200 p-4">
            <h2 class="text-lg font-semibold mb-3">Pending MCP Servers</h2>
            <template x-if="servers.length === 0"><p class="text-sm text-gray-500">No pending servers.</p></template>
            <template x-for="server in servers" :key="server.id">
                <div class="border rounded-lg p-3 mb-3">
                    <div class="font-semibold" x-text="server.name"></div>
                    <div class="text-xs text-gray-600 mt-1">
                        <span class="font-medium">Risk:</span> <span x-text="server.risk_level"></span>
                        • <span class="font-medium">Fingerprint:</span> <code x-text="server.config_fingerprint"></code>
                    </div>
                    <div class="text-xs text-gray-600 mt-1"><code x-text="JSON.stringify(server.allowlist_policy || {})"></code></div>
                    <div class="mt-2 flex gap-2">
                        <button @click="actionServer(server.id, 'approve')" class="px-2 py-1 text-xs rounded bg-green-600 text-white">Approve</button>
                        <button @click="actionServer(server.id, 'reject')" class="px-2 py-1 text-xs rounded bg-red-600 text-white">Reject</button>
                        <button @click="actionServer(server.id, 'revoke')" class="px-2 py-1 text-xs rounded bg-amber-600 text-white">Revoke</button>
                    </div>
                </div>
            </template>
        </section>

        <section class="bg-white rounded-lg border border-gray-200 p-4">
            <h2 class="text-lg font-semibold mb-3">Pending Virtual Tools</h2>
            <template x-if="virtualTools.length === 0"><p class="text-sm text-gray-500">No pending virtual tools.</p></template>
            <template x-for="tool in virtualTools" :key="tool.id">
                <div class="border rounded-lg p-3 mb-3">
                    <div class="font-semibold" x-text="tool.name"></div>
                    <div class="text-xs text-gray-600 mt-1">
                        <span class="font-medium">Server:</span> <span x-text="tool.source_server_name"></span>
                        • <span class="font-medium">Fingerprint:</span> <code x-text="tool.config_fingerprint"></code>
                    </div>
                    <div class="text-xs text-gray-600 mt-1"><code x-text="JSON.stringify(tool.config || {})"></code></div>
                    <div class="mt-2 flex gap-2">
                        <button @click="actionVirtual(tool.id, 'approve')" class="px-2 py-1 text-xs rounded bg-green-600 text-white">Approve</button>
                        <button @click="actionVirtual(tool.id, 'reject')" class="px-2 py-1 text-xs rounded bg-red-600 text-white">Reject</button>
                        <button @click="actionVirtual(tool.id, 'revoke')" class="px-2 py-1 text-xs rounded bg-amber-600 text-white">Revoke</button>
                    </div>
                </div>
            </template>
        </section>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
function whitelistManager() {
    return {
        token: "{{ token|e }}",
        servers: [],
        virtualTools: [],
        init() { this.load(); },
        async load() {
            const res = await fetch(`/${this.token}/api/whitelist/pending`);
            const data = await res.json();
            this.servers = data.servers || [];
            this.virtualTools = data.virtual_tools || [];
        },
        async actionServer(serverId, action) {
            await fetch(`/${this.token}/api/whitelist/servers/${serverId}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({action})
            });
            await this.load();
        },
        async actionVirtual(toolId, action) {
            await fetch(`/${this.token}/api/whitelist/virtual-tools/${toolId}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({action})
            });
            await this.load();
        }
    }
}
</script>
{% endblock %}
